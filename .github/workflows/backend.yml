name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rotary-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rotary_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: rotary_connect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rotary_app:test_password@localhost:5432/rotary_connect
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyflakes

      - name: Lint
        run: pyflakes app tests

      - name: Run tests
        run: pytest tests/ -v
