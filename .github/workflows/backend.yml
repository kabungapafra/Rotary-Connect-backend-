name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rotary-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rotary_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: rotary_connect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rotary_app:test_password@localhost:5432/rotary_connect
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyflakes

      - name: Lint
        run: pyflakes app tests

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: 🚀 Deploy to rotary-server
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 45.140.185.111 >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -a --delete \
            --exclude .env --exclude .venv --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@45.140.185.111:/srv/rotary-backend/

      # Startup can take well over a minute (create_all plus the legacy
      # photo/thumbnail migrations run before workers accept traffic — a
      # real deploy took ~75s on 2026-07-13), so the health check polls
      # for up to 3 minutes rather than sampling once. NB: the ssh script
      # is single-quoted — no apostrophes inside it, or the quote closes
      # early and the rest of the script runs on the runner instead of the
      # server.
      - name: Install deps, restart, verify health
        run: |
          ssh -i ~/.ssh/deploy_key root@45.140.185.111 '
            set -e
            chown -R rotary:rotary /srv/rotary-backend
            sudo -u rotary /srv/rotary-backend/.venv/bin/pip install -q -r /srv/rotary-backend/requirements.txt
            systemctl restart rotary
            for i in $(seq 1 36); do
              sleep 5
              curl -sf http://127.0.0.1:8000/health && exit 0
            done
            echo "API did not become healthy within 3 minutes" >&2
            journalctl -u rotary -n 50 --no-pager >&2
            exit 1
          '
