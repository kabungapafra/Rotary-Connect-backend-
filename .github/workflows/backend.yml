name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rotary-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rotary_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: rotary_connect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rotary_app:test_password@localhost:5432/rotary_connect
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyflakes

      - name: Lint
        run: pyflakes app tests

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: 🚀 Deploy to rotary-server
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 45.140.185.111 >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -a --delete \
            --exclude .env --exclude .venv --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@45.140.185.111:/srv/rotary-backend/

      - name: Install deps, restart, verify health
        run: |
          ssh -i ~/.ssh/deploy_key root@45.140.185.111 '
            set -e
            chown -R rotary:rotary /srv/rotary-backend
            sudo -u rotary /srv/rotary-backend/.venv/bin/pip install -q -r /srv/rotary-backend/requirements.txt
            systemctl restart rotary
            # Workers can take ~10s to come up (migrations run at startup);
            # poll instead of a one-shot check so the deploy isn't marked
            # failed while the API is still booting.
            for i in $(seq 1 15); do
              sleep 2
              curl -sf http://127.0.0.1:8000/health && exit 0
            done
            echo "API did not become healthy within 30s" >&2
            journalctl -u rotary -n 50 --no-pager >&2
            exit 1
          '
